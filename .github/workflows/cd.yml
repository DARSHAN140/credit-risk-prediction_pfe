name: CD - Docker

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Tests avant livraison
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ENVIRONMENT: test
      JWT_SECRET_KEY: cd-secret-key-with-more-than-32-characters

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements-dev.txt

      - name: Exécuter les tests
        run: pytest -q

  publish:
    name: Construire et publier l'image
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Préparer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Se connecter à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Générer les métadonnées de l'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bmce-credit-risk-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Construire et publier l'image Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Résumé de livraison
        run: |
          echo "## Livraison Docker réussie" >> "$GITHUB_STEP_SUMMARY"
          echo "Image publiée dans GitHub Container Registry :" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/${{ github.repository_owner }}/bmce-credit-risk-api" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
